{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>{{ site.name }} | Map | BlueSplit</title>
    <link rel="icon" type="image/png" href="/static/core/images/favicon.png">

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

    <!-- jQuery -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

    <style>
        html, body { 
            height: 100%; 
            margin: 0; 
            font-family: Inter, system-ui, -apple-system, sans-serif; 
        }
        #topbar { 
            height: 42px; 
            background: rgba(15,22,36,0.92); 
            color: white; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            padding: 0 14px; 
            z-index: 1000;
        }
        #map { 
            position: absolute; 
            top: 42px; 
            right: 0; 
            left: 0; 
            bottom: 0; 
        }
        .map-label { 
            position: absolute; 
            top: 52px; 
            left: 16px; 
            z-index: 900; 
            padding: 6px 12px; 
            border-radius: 14px; 
            background: rgba(15,110,203,0.9); 
            color: white; 
            font-weight: 700; 
            font-size: 0.9rem;
        }
        .top-actions { 
            margin-left: 8px; 
            color: rgba(255,255,255,0.8); 
            text-decoration: none;
            font-size: 0.88rem;
            transition: color 0.2s;
        }
        .top-actions:hover { color: white; }
        .header-sep { color: rgba(255,255,255,0.3); margin: 0 8px; }
        .topbar-spacer { flex: 1; }
        .topbar-info { color: rgba(255,255,255,0.7); font-size: 0.88rem; }
        .logout-form { display: inline; margin-left: 8px; }
        .logout-btn {
            background: none; border: none;
            color: rgba(255,255,255,0.65); cursor: pointer;
            padding: 0; font-family: inherit; font-size: 0.88rem; transition: color 0.2s;
        }
        .logout-btn:hover { color: white; }

        /* ══════════════════════════════════════════════════════
           Obscure pane — tiles already have real alpha
           transparency from ImageMagick processing.
           No blend mode needed; non-transparent pixels
           render at full opacity.
           ══════════════════════════════════════════════════════ */
    </style>

    <script>
        const SITE_LAT   = {{ site.latitude }};
        const SITE_LNG   = {{ site.longitude }};
        const SITE_NAME  = "{{ site.name|escapejs }}";
        const FLIGHT_DATE = "{{ flight.date }}";
        const FLIGHT_URL = "{{ flight_url }}";
        const OBSCURES   = {{ obscures_json|safe }};
        const GEOJSONS   = {{ geojsons_json|safe }};  // [{id, name, url, level, color}]
    </script>
</head>
<body>
    <div id="topbar">
        <a href="{% url 'dashboard' %}?site={{ site.pk }}" class="top-actions">← Dashboard</a>
        <span class="header-sep">|</span>
        <div style="font-weight:700; font-size:0.95rem;">{{ site.name }}</div>
        <div class="topbar-spacer"></div>
        <div class="topbar-info">Last flight: {{ flight.date }}</div>
        <form method="post" action="{% url 'logout' %}" class="logout-form">
            {% csrf_token %}
            <button type="submit" class="logout-btn">Logout</button>
        </form>
    </div>

    <div id="map"></div>
    <div class="map-label">{{ flight.date }}</div>

    <script>
    window.addEventListener('load', function () {

        const center = [SITE_LAT, SITE_LNG];

        // ── Create map ──────────────────────────────────────────────────────────
        const map = L.map('map', {
            center: center,
            zoom: 15,
            preferCanvas: true,
            maxZoom: 22
        });

        // ── Create panes ────────────────────────────────────────────────────────
        // Layer order (bottom → top):
        //   tilePane(200)    = OSM basemap
        //   tilePane(200)    = Orthomosaic flight tiles
        //   geojsonPane(450) = GeoJSON vectors  ← toggleable in layer control
        //   obscurePane(650) = Obscure masking tiles ← NOT in layer control

        map.createPane('geojsonPane');
        map.getPane('geojsonPane').style.zIndex = 450;

        map.createPane('obscurePane');
        map.getPane('obscurePane').style.zIndex = 650;
        map.getPane('obscurePane').style.pointerEvents = 'none';

        console.log('✓ geojsonPane(450) and obscurePane(650) created');

        // ── HTML escape helper ───────────────────────────────────────────────────
        function escapeHtml(str) {
            return String(str || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        // ── Base map ────────────────────────────────────────────────────────────
        const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 20,
            attribution: '© OpenStreetMap'
        });
        osm.addTo(map);

        // ── Flight orthomosaic (toggleable) ────────────────────────────────────
        let droneLayer = null;
        if (FLIGHT_URL && FLIGHT_URL !== '') {
            console.log('Loading flight orthomosaic:', FLIGHT_URL);
            droneLayer = L.tileLayer(FLIGHT_URL, {
                tms: true,
                opacity: 1.0,
                minZoom: 13,
                maxNativeZoom: 21,
                maxZoom: 22,
                attribution: 'Flight Data'
            });
            droneLayer.addTo(map);
            console.log('✓ Flight layer added');
        }

        // ── Build overlay object — GeoJSON layers added here so they appear
        //    in the layer control checked (visible) by default ────────────────
        const overlays = {};
        if (droneLayer) overlays['Orthomosaic'] = droneLayer;

        if (GEOJSONS && GEOJSONS.length > 0) {
            console.log('Loading', GEOJSONS.length, 'GeoJSON layer(s)');
            GEOJSONS.forEach(function(gj) {
                const color = gj.color || 'cornflowerblue';
                const gjStyle = {
                    color:       color,
                    weight:      2,
                    opacity:     1,
                    fillColor:   color,
                    fillOpacity: 0.2,
                    pane:        'geojsonPane'
                };

                // Create a layerGroup placeholder so the control checkbox
                // appears immediately, before the async fetch completes
                const group = L.layerGroup([], { pane: 'geojsonPane' }).addTo(map);
                overlays[gj.name] = group;

                fetch(gj.url)
                    .then(function(r) {
                        if (!r.ok) throw new Error('HTTP ' + r.status);
                        return r.json();
                    })
                    .then(function(data) {
                        const gjLayer = L.geoJSON(data, {
                            pane: 'geojsonPane',
                            style: function() { return gjStyle; },
                            pointToLayer: function(feature, latlng) {
                                return L.circleMarker(latlng, {
                                    pane: 'geojsonPane',
                                    radius: 6,
                                    ...gjStyle
                                });
                            },
                            onEachFeature: function(feature, layer) {
                                const label = (feature.properties && feature.properties.name)
                                    ? feature.properties.name
                                    : gj.name;
                                layer.bindTooltip(label, { sticky: true });

                                if (feature.properties && Object.keys(feature.properties).length > 0) {
                                    const popupHtml = Object.entries(feature.properties)
                                        .map(function([key, value]) {
                                            return '<div><strong>' + escapeHtml(key) + ':</strong> ' + escapeHtml(value === null ? '' : value) + '</div>';
                                        })
                                        .join('');
                                    layer.bindPopup(popupHtml, { maxWidth: 320 });
                                }
                            }
                        });
                        group.addLayer(gjLayer);
                        console.log('✓ GeoJSON loaded:', gj.name, '(color:', color + ')');
                    })
                    .catch(function(err) {
                        console.error('GeoJSON fetch error:', gj.name, err);
                    });
            });
        }

        // ── Layer control — Obscure NOT listed, GeoJSONs ARE listed ────────────
        L.control.layers({ 'OpenStreetMap': osm }, overlays).addTo(map);

        // ── Obscure tile layers → obscurePane (added LAST so they stay on top) ─
        if (OBSCURES && OBSCURES.length > 0) {
            console.log('Loading', OBSCURES.length, 'Obscure layer(s)');
            OBSCURES.forEach(function(obscure, idx) {
                try {
                    const layerName = obscure.name || ('Obscure ' + (idx + 1));
                    const tileUrl   = obscure.aws_url + '{z}/{x}/{y}.png';
                    console.log('  Layer:', layerName, '→', tileUrl);
                    const layer = L.tileLayer(tileUrl, {
                        tms: true,
                        opacity: 1.0,
                        minZoom: 13,
                        maxNativeZoom: 21,
                        maxZoom: 22,
                        crossOrigin: 'anonymous',
                        pane: 'obscurePane'
                    });
                    layer.addTo(map);
                    console.log('  ✓ Added to obscurePane:', layerName);
                } catch (err) {
                    console.error('Error loading obscure layer:', err);
                }
            });
            console.log('🟢 All Obscure layers loaded in obscurePane(650)');
        } else {
            console.log('ℹ No Obscure layers for this site');
        }

    });
    </script>
</body>
</html>
