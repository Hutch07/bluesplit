{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>{{ site.name }} | Map | BlueSplit</title>
    <link rel="icon" type="image/png" href="/static/core/images/favicon.png">

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

    <!-- jQuery -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

    <style>
        html, body { 
            height: 100%; 
            margin: 0; 
            font-family: Inter, system-ui, -apple-system, sans-serif; 
        }
        #topbar { 
            height: 42px; 
            background: rgba(15,22,36,0.92); 
            color: white; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            padding: 0 14px; 
            z-index: 1000;
        }
        #map { 
            position: absolute; 
            top: 42px; 
            right: 0; 
            left: 0; 
            bottom: 0; 
        }
        .map-label { 
            position: absolute; 
            top: 52px; 
            left: 16px; 
            z-index: 900; 
            padding: 6px 12px; 
            border-radius: 14px; 
            background: rgba(15,110,203,0.9); 
            color: white; 
            font-weight: 700; 
            font-size: 0.9rem;
        }
        .top-actions { 
            margin-left: 8px; 
            color: rgba(255,255,255,0.8); 
            text-decoration: none;
            font-size: 0.88rem;
            transition: color 0.2s;
        }
        .top-actions:hover { color: white; }
        .header-sep { color: rgba(255,255,255,0.3); margin: 0 8px; }
        .topbar-spacer { flex: 1; }
        .topbar-info { color: rgba(255,255,255,0.7); font-size: 0.88rem; }
        .logout-form { display: inline; margin-left: 8px; }
        .logout-btn {
            background: none; border: none;
            color: rgba(255,255,255,0.65); cursor: pointer;
            padding: 0; font-family: inherit; font-size: 0.88rem; transition: color 0.2s;
        }
        .logout-btn:hover { color: white; }

        /* ══════════════════════════════════════════════════════
           Obscure pane tiles - make black pixels transparent
           The CSS mix-blend-mode multiply makes black (0,0,0)
           fully transparent against any background.
           ══════════════════════════════════════════════════════ */
        .leaflet-obscure-pane {
            mix-blend-mode: multiply;
        }
    </style>

    <script>
        const SITE_LAT   = {{ site.latitude }};
        const SITE_LNG   = {{ site.longitude }};
        const SITE_NAME  = "{{ site.name|escapejs }}";
        const FLIGHT_DATE = "{{ flight.date }}";
        const FLIGHT_URL = "{{ flight_url }}";
        const OBSCURES   = {{ obscures_json|safe }};
    </script>
</head>
<body>
    <div id="topbar">
        <a href="{% url 'dashboard' %}?site={{ site.pk }}" class="top-actions">← Dashboard</a>
        <span class="header-sep">|</span>
        <div style="font-weight:700; font-size:0.95rem;">{{ site.name }}</div>
        <div class="topbar-spacer"></div>
        <div class="topbar-info">Last flight: {{ flight.date }}</div>
        <form method="post" action="{% url 'logout' %}" class="logout-form">
            {% csrf_token %}
            <button type="submit" class="logout-btn">Logout</button>
        </form>
    </div>

    <div id="map"></div>
    <div class="map-label">{{ flight.date }}</div>

    <script>
    window.addEventListener('load', function () {

        const center = [SITE_LAT, SITE_LNG];

        // ── Create map ──────────────────────────────────────────────────────────
        const map = L.map('map', {
            center: center,
            zoom: 15,
            preferCanvas: true,
            maxZoom: 22
        });

        // ── Create the obscure pane BEFORE any layers are added ─────────────────
        // Default z-indices: tilePane=200, overlayPane=400
        // 650 puts obscure above everything including overlays
        map.createPane('obscurePane');
        map.getPane('obscurePane').style.zIndex = 650;
        // Disable pointer events so the pane never blocks map interaction
        map.getPane('obscurePane').style.pointerEvents = 'none';
        // Apply the CSS class for mix-blend-mode black transparency
        map.getPane('obscurePane').classList.add('leaflet-obscure-pane');

        console.log('✓ obscurePane created (zIndex=650, mix-blend-mode=multiply)');
        console.log('✓ update');

        // ── Base map ────────────────────────────────────────────────────────────
        const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 20,
            attribution: '© OpenStreetMap'
        });
        osm.addTo(map);

        // ── Flight orthomosaic (toggleable) ────────────────────────────────────
        let droneLayer = null;
        if (FLIGHT_URL && FLIGHT_URL !== '') {
            console.log('Loading flight orthomosaic:', FLIGHT_URL);
            droneLayer = L.tileLayer(FLIGHT_URL, {
                tms: true,
                opacity: 1.0,
                minZoom: 13,
                maxNativeZoom: 21,
                maxZoom: 22,
                attribution: 'Flight Data'
            });
            droneLayer.addTo(map);
            console.log('✓ Flight layer added');
        }

        // Layer control - flight is toggleable, obscure layers are NOT listed here
        const overlays = droneLayer ? { 'Orthomosaic': droneLayer } : {};
        L.control.layers({ 'OpenStreetMap': osm }, overlays).addTo(map);

        // ── Obscure tile layers → always in obscurePane ─────────────────────────
        if (OBSCURES && OBSCURES.length > 0) {
            console.log('Loading', OBSCURES.length, 'Obscure layer(s)');

            OBSCURES.forEach((obscure, idx) => {
                try {
                    const layerName = obscure.name || ('Obscure ' + (idx + 1));
                    const tileUrl   = obscure.aws_url + '{z}/{x}/{y}.png';

                    console.log('  Layer:', layerName, '→', tileUrl);

                    const layer = L.tileLayer(tileUrl, {
                        tms: true,
                        opacity: 1.0,
                        minZoom: 13,
                        maxNativeZoom: 21,
                        maxZoom: 22,
                        crossOrigin: 'anonymous',
                        // ← KEY: assign to the custom pane
                        pane: 'obscurePane'
                    });

                    layer.addTo(map);
                    console.log('  ✓ Added to obscurePane:', layerName);

                } catch (err) {
                    console.error('🔴 Error loading obscure layer:', err);
                }
            });

            console.log('🟢 All Obscure layers loaded in obscurePane (zIndex=650)');

        } else {
            console.log('ℹ No Obscure layers for this site');
        }

    });
    </script>
</body>
</html>
