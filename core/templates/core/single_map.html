{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>{{ site.name }} | Map | BlueSplit</title>
    <link rel="icon" type="image/png" href="/static/core/images/favicon.png">

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

    <!-- jQuery -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

    <style>
        html, body { 
            height: 100%; 
            margin: 0; 
            font-family: Inter, system-ui, -apple-system, sans-serif; 
        }
        #topbar { 
            height: 42px; 
            background: rgba(15,22,36,0.92); 
            color: white; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            padding: 0 14px; 
            z-index: 1000;
        }
        #map { 
            position: absolute; 
            top: 42px; 
            right: 0; 
            left: 0; 
            bottom: 0; 
        }
        .map-label { 
            position: absolute; 
            top: 52px; 
            left: 16px; 
            z-index: 900; 
            padding: 6px 12px; 
            border-radius: 14px; 
            background: rgba(15,110,203,0.9); 
            color: white; 
            font-weight: 700; 
            font-size: 0.9rem;
        }
        .top-actions { 
            margin-left: 8px; 
            color: rgba(255,255,255,0.8); 
            text-decoration: none;
            font-size: 0.88rem;
            transition: color 0.2s;
        }
        .top-actions:hover {
            color: white;
        }
        .header-sep {
            color: rgba(255,255,255,0.3);
            margin: 0 8px;
        }
        .topbar-spacer {
            flex: 1;
        }
        .topbar-info {
            color: rgba(255,255,255,0.7);
            font-size: 0.88rem;
        }
        .logout-form {
            display: inline;
            margin-left: 8px;
        }
        .logout-btn {
            background: none;
            border: none;
            color: rgba(255,255,255,0.65);
            cursor: pointer;
            padding: 0;
            font-family: inherit;
            font-size: 0.88rem;
            transition: color 0.2s;
        }
        .logout-btn:hover {
            color: white;
        }
    </style>

    <script>
        // Data injected from Django view
        const SITE_LAT = {{ site.latitude }};
        const SITE_LNG = {{ site.longitude }};
        const SITE_NAME = "{{ site.name|escapejs }}";
        const FLIGHT_DATE = "{{ flight.date }}";
        const FLIGHT_URL = "{{ flight_url }}"; // tile pattern with {z}/{x}/{y}.png
        const OBSCURES = {{ obscures_json|safe }}; // Obscure tile layers
    </script>
</head>
<body>
    <div id="topbar">
        <a href="{% url 'dashboard' %}?site={{ site.pk }}" class="top-actions">← Dashboard</a>
        <span class="header-sep">|</span>
        <div style="font-weight:700; font-size: 0.95rem;">{{ site.name }}</div>
        <div class="topbar-spacer"></div>
        <div class="topbar-info">Last flight: {{ flight.date }}</div>
        <form method="post" action="{% url 'logout' %}" class="logout-form">
            {% csrf_token %}
            <button type="submit" class="logout-btn">Logout</button>
        </form>
    </div>

    <div id="map"></div>
    <div class="map-label">{{ flight.date }}</div>

    <script>
    // ══════════════════════════════════════════════════════════════════════════════
    // Global variable to hold the tile layers (so they stay on top)
    // ══════════════════════════════════════════════════════════════════════════════
    let obscureLayers = [];

    // ══════════════════════════════════════════════════════════════════════════════
    // Initialize the map when page loads
    // ══════════════════════════════════════════════════════════════════════════════
    window.addEventListener('load', function() {
        const center = [SITE_LAT, SITE_LNG];
        
        // Base map (OpenStreetMap)
        const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { 
            maxZoom: 20, 
            attribution: '© OpenStreetMap' 
        });
        
        // Create map with just the basemap initially
        const map = L.map('map', { 
            layers: [osm], 
            center: center, 
            zoom: 15, 
            preferCanvas: true, 
            maxZoom: 22 
        });

        console.log('🔵 Map initialized at', center);

        // Add flight orthomosaic layer if available
        if (FLIGHT_URL && FLIGHT_URL !== '') {
            try {
                console.log('Loading flight orthomosaic from:', FLIGHT_URL);
                const drone = L.tileLayer(FLIGHT_URL, { 
                    tms: true, 
                    opacity: 1.0, 
                    minZoom: 13, 
                    maxNativeZoom: 21, 
                    maxZoom: 22,
                    attribution: 'Flight Data'
                });
                drone.addTo(map);
                console.log('✓ Flight orthomosaic layer added');
            } catch (e) {
                console.error('Failed to add drone layer', e);
            }
        }

        // ── Add Obscure tile layers on top (always visible) ──
        // These use standard XYZ tile format with {z}/{x}/{y}.png
        if (OBSCURES && OBSCURES.length > 0) {
            console.log('Loading', OBSCURES.length, 'Obscure tile layer(s)');
            
            OBSCURES.forEach((obscure, idx) => {
                try {
                    const layerName = obscure.name || 'Tile Layer ' + (idx + 1);
                    
                    // Build complete tile URL by adding {z}/{x}/{y}.png
                    const tileUrl = obscure.aws_url + '{z}/{x}/{y}.png';
                    console.log('Processing Obscure layer:', layerName);
                    console.log('Tile URL:', tileUrl);
                    
                    // Create tile layer
                    const layer = L.tileLayer(tileUrl, {
                        tms: true,                     // XYZ format (not TMS - gdal2tiles creates XYZ)
                        opacity: 1.0,                   // Fully opaque - blocks everything below
                        minZoom: 13,
                        maxNativeZoom: 21,              // Tiles exist up to zoom 21
                        maxZoom: 22,
                        crossOrigin: 'anonymous',
                        attribution: layerName,
                        zIndex: 999                     // High z-index to stay on top
                    });
                    
                    // Add to map
                    layer.addTo(map);
                    
                    // Keep reference for later
                    obscureLayers.push(layer);
                    
                    // Bring this layer to the front
                    layer.bringToFront();
                    
                    console.log('✓ Obscure layer ' + (idx + 1) + ' added:', layerName);
                    
                } catch (error) {
                    console.error('🔴 Error loading Obscure layer:', error);
                }
            });
            
            // Make sure tile layers stay on top when basemap is toggled
            map.on('baselayerchange', function() {
                obscureLayers.forEach(layer => {
                    layer.bringToFront();
                });
                console.log('Obscure layers brought to front');
            });
            
            console.log('🟢 All Obscure layers successfully added to map!');
            
        } else {
            console.log('No Obscure tile layers to load');
        }
    });
    </script>
</body>
</html>
