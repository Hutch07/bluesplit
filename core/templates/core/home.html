<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>BlueSplit</title>
</head>
<body>
    <header>
        {% if request.user.is_authenticated %}
            <p>Signed in as {{ request.user.username }}. <a href="{% url 'logout' %}">Logout</a></p>
        {% else %}
            <p><a href="{% url 'login' %}">Login</a> | <a href="{% url 'password_reset' %}">Reset Password</a></p>
        {% endif %}
    </header>

    <h1>BlueSplit is ready for Azure Web App</h1>
    <p>Welcome to your new Django 6 application.</p>
    <p><a href="{% url 'dashboard' %}">Go to dashboard (login required)</a></p>
</body>
</html>
