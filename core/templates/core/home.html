<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>BlueSplit</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: #1b2430;
            background: url("/static/core/images/BWB_Drone.png") no-repeat center center fixed;
            background-size: cover;
        }
        header {
            padding: 5px;
            background: rgba(250, 253, 171, 0.9);
        }
        h1 {
            text-align: left;
            margin-top: 5px;
        }
        p {
            text-align: center;
        }
        .logout-btn {
            background: none;
            border: none;
            color: #0f6ecb;
            cursor: pointer;
            padding: 0;
            font-family: inherit;
            font-size: inherit;
            text-decoration: underline;
        }
        .logout-btn:hover {
            color: #0d5ab2;
        }
    </style>
</head>
<body>
    <header>
        {% if request.user.is_authenticated %}
            <p>Signed in as {{ request.user.username }}.
                <form method="post" action="{% url 'logout' %}" style="display:inline">
                    {% csrf_token %}
                    <button type="submit" class="logout-btn">Logout</button>
                </form>
            </p>
        {% else %}
            <h1>SSI Split map.</h1>
            <p><a href="{% url 'login' %}">Login</a> | <a href="{% url 'password_reset' %}">Reset Password</a></p>
        {% endif %}
    </header>

    <p>SSI home www.ssi-mi.com</p>
    <p><a href="{% url 'dashboard' %}">Go to dashboard (login required)</a></p>
    {% if is_pilot_or_admin %}
        <p><a href="{% url 'add_flight' %}">Log a Flight</a></p>
    {% endif %}
</body>
</html>
