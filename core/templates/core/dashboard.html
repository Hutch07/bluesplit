<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Dashboard | BlueSplit</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: #1b2430;
            background: url("/static/core/images/BWB_Drone.png") no-repeat center center fixed;
            background-size: cover;
        }
        header {
            padding: 5px;
            background: rgba(250, 253, 171, 0.9);
        }
        h1 {
            text-align: left;
            margin-top: 5px;
        }
        p {
            text-align: center;
        }
        .dashboard-content {
            padding: 20px;
            background: rgba(255, 255, 255, 0.9);
            margin: 20px auto;
            max-width: 800px;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <header>
        <p>Signed in as {{ request.user.username }}. <a href="{% url 'logout' %}">Logout</a></p>
    </header>

    <div class="dashboard-content">
        <h1>Dashboard</h1>
        <p>Welcome, {{ request.user.username }}. This page requires login.</p>
        {% if is_admin %}
            <p><a href="/admin/">Go to Admin Page</a></p>
        {% endif %}
        <p><a href="{% url 'home' %}">Home</a></p>
    </div>
</body>
</html>
