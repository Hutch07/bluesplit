{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Login | BlueSplit</title>
    <link rel="stylesheet" href="{% static 'core/css/login.css' %}">
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <h1>BlueSplit Login</h1>
            <form method="post" novalidate>
                {% csrf_token %}
                {% if next %}
                    <input type="hidden" name="next" value="{{ next }}">
                {% endif %}
                <div class="field">
                    <label for="id_username">Username</label>
                    {{ form.username }}
                </div>
                <div class="field">
                    <label for="id_password">Password</label>
                    {{ form.password }}
                </div>
                <button type="submit">Sign In</button>
            </form>
            <p class="help-text"><a href="{% url 'password_reset' %}">Forgot your password?</a></p>
            <p class="help-text"><a href="{% url 'home' %}">Back to home</a></p>
        </div>
    </div>
</body>
</html>
