<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Password Reset | BlueSplit</title>
</head>
<body>
    <h1>Password Reset</h1>
    <p>Enter your username email address and we'll send you a reset link.</p>
    <form method="post" novalidate>
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Send reset link</button>
    </form>
    <p><a href="{% url 'login' %}">Back to login</a></p>
</body>
</html>
